# SQLKit 信创 (Xinchuang) Database Stack
#
# Chinese domestic databases: MySQL-compatible and proprietary.
# TiDB is in sqlkit-core since it's commonly used for daily testing.
#
# Start:  docker compose -f docker-compose-sqlkit-xc.yml up -d
# Stop:   docker compose -f docker-compose-sqlkit-xc.yml down
# Reset:  docker compose -f docker-compose-sqlkit-xc.yml down -v
#
# ╔═══════════════════════════════════════════════════════════════╗
# ║  Component      Status     Port    User           Password   ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  GBase 8a       ✅ ready   5258    root           root       ║
# ║  XuguDB         ✅ ready   5138    SYSDBA         (none)     ║
# ║  YashanDB       ✅ ready   1688    sys            Yasdb@123  ║
# ║  KingbaseES     ✅ ready   54321   SYSTEM         kingbase@123║
# ║  GBase 8c       ⚠️ manual  5437    gbase          Gbase@123  ║
# ║  OceanBase      ❌ n/a     2881    -              -          ║
# ╚═══════════════════════════════════════════════════════════════╝
#
# Host setup (one-time, for GBase 8c on Linux or Docker Desktop VM):
#   docker run --privileged --pid=host alpine sh -c \
#     'sysctl -w vm.max_map_count=655360
#      sysctl -w vm.overcommit_memory=0
#      sysctl -w fs.file-max=6573688
#      sysctl -w fs.aio-max-nr=1048576'

name: sqlkit-xc

services:
  # ── OceanBase (蚂蚁集团 信创 MySQL-compatible) ──────────────────
  # ⚠️ DISABLED: RDTSCP instruction not available in Docker Desktop for macOS.
  #   The observer binary uses RDTSCP at startup (SIGILL on LinuxKit VM).
  #   Re-enable on a Linux host or with Colima (QEMU with --cpu-type host).
  # oceanbase:
  #   image: oceanbase/oceanbase-ce:4.2.1-lts
  #   container_name: sqlkit-oceanbase
  #   privileged: true
  #   environment:
  #     MODE: mini
  #     EXIT_WHILE_ERROR: ${EXIT_WHILE_ERROR:-true}
  #     OB_MEMORY_LIMIT: ${OB_MEMORY_LIMIT:-4G}
  #     OB_SYSTEM_MEMORY: ${OB_SYSTEM_MEMORY:-1G}
  #     OB_DATAFILE_SIZE: ${OB_DATAFILE_SIZE:-2G}
  #     OB_LOG_DISK_SIZE: ${OB_LOG_DISK_SIZE:-2G}
  #     OB_TENANT_PASSWORD: ${OCEANBASE_PASSWORD:-ocean#pass1}
  #     OB_SYS_PASSWORD: ${OCEANBASE_SYS_PASSWORD:-sys@pass1}
  #   ports:
  #     - '2881:2881'
  #   networks:
  #     - sqlkit-xc-net
  #   ulimits:
  #     nofile:
  #       soft: 65536
  #       hard: 65536

  # ── GBase 8a (南大通用 信创 MPP analytical) ────────────────────
  gbase8a:
    image: shihd/gbase8a:1.0
    container_name: sqlkit-gbase8a
    ports:
      - '5258:5258'
    networks:
      - sqlkit-xc-net
    # Default user: root / pass: root / DB: gbase
    # No healthcheck — minimal image, no extra tools.

  # ── XuguDB (虚谷 信创 proprietary) ──────────────────────────────
  xugudb:
    image: pandama0314/xugu-database:12.9.10-20250731-x86_64
    container_name: sqlkit-xugudb
    ports:
      - '5138:5138'
    networks:
      - sqlkit-xc-net
    # Default user: SYSDBA / DB: SYSTEM
    # No healthcheck — minimal image.

  # ── PolarDB-X (阿里云 信创 MySQL-compatible) ────────────────────
  # polardbx:
  #   image: polardbx/polardb-x:v2.4.2_5.4.19
  #   container_name: sqlkit-polardbx
  #   ports:
  #     - '8527:8527'
  #   networks:
  #     - sqlkit-xc-net
  #   mem_limit: 12g
  #   # ⚠️ REQUIRES 12GB+ RAM. The all-in-one image runs CN, DN, and CDC.
  #   # Connect: mysql -h127.0.0.1 -P8527 -upolardbx_root -p123456
  #   # Start takes ~1 minute.

  # ── DM8 (达梦 信创 proprietary) ─────────────────────────────────
  # dm8:
  #   image: dm8:dm8_20220822_rev166351_x86_rh6_64_ctm
  #   container_name: sqlkit-dm8
  #   privileged: true
  #   environment:
  #     PAGE_SIZE: 16
  #     CASE_SENSITIVE: 0
  #     UNICODE_FLAG: 1
  #     INSTANCE_NAME: dm8
  #     SYSDBA_PWD: ${DM8_PASSWORD:-Dameng@12345}
  #   ports:
  #     - '5236:5236'
  #   volumes:
  #     - dm8_data:/opt/dmdbms/data
  #   networks:
  #     - sqlkit-xc-net
  #   # Manual setup required:
  #   #   1. Download from https://eco.dameng.com
  #   #   2. docker load -i dm8_20220822_rev166351_x86_rh6_64_ctm.tar
  #   # Default user: SYSDBA / pass: Dameng@12345

  # ── TDSQL (腾讯云 信创 MySQL-compatible) ────────────────────────
  # No Docker image available — requires multi-node ansible deployment.
  # Testing requires a cloud instance or dedicated environment.

  # ── KingbaseES (人大金仓 信创 PG-based) ─────────────────────────
  kingbasees:
    image: wephoon/kingbase:latest
    container_name: sqlkit-kingbasees
    # ⚠️ Workaround: entrypoint uses "sys_ctl restart" which fails on first start
    # because /data/kingbase.opts doesn't exist yet. We patch restart→start, then
    # switch to the kingbase user to run the original entrypoint.
    privileged: true
    user: root
    entrypoint: bash
    command: >
      -c '
      sed -i "s| restart$| start|" /opt/kingbase/docker-entrypoint.sh &&
      exec su kingbase -c /opt/kingbase/docker-entrypoint.sh
      '
    environment:
      SYSTEM_PASSWORD: ${KINGBASEES_PASSWORD:-kingbase@123}
    ports:
      - '54321:54321'
    networks:
      - sqlkit-xc-net
    # Default user: SYSTEM / pass: kingbase@123 / port: 54321
    # Supports x86_64 and arm64/v8. Community image — not official.

  # ── YashanDB (崖山 信创 proprietary) ────────────────────────────
  yashandb:
    image: wdmcheng/yashandb:23.4.4.100
    container_name: sqlkit-yashandb
    environment:
      SYS_PASSWD: ${YASHANDB_PASSWORD:-Yasdb@123}
    ports:
      - '1688:1688'
    networks:
      - sqlkit-xc-net
    # Default user: sys / pass: Yasdb@123 / port: 1688
    # Start takes ~1 min. Check: docker logs sqlkit-yashandb
    # Should see "DeployYasdbCluster task status: SUCCESS" when ready.

  # ── GBase 8c (南大通用 信创 PG-based distributed) ──────────────
  gbase8c:
    image: lhrbest/gbase8c_1:latest
    container_name: sqlkit-gbase8c
    privileged: true
    restart: unless-stopped
    ports:
      - '5437:5432'
    networks:
      - sqlkit-xc-net
    # PG-wire compatible. Default user: gbase / password: Gbase@123
    #
    # ⚠️ Container does NOT auto-start the database. On Docker Desktop for macOS,
    # systemd may not work (no D-Bus). Start etcd directly instead:
    #
    #   1. Start etcd:
    #      docker exec sqlkit-gbase8c bash -c 'mkdir -p /run/dbus && /usr/bin/dbus-daemon --system && nohup etcd --name etcd0 --advertise-client-urls http://127.0.0.1:2379 --listen-client-urls http://0.0.0.0:2379 --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://127.0.0.1:2380 --initial-cluster etcd0=http://127.0.0.1:2380 &'
    #
    #   2. Start GBase 8c cluster (if pre-deployed):
    #      docker exec sqlkit-gbase8c su - gbase -c "gha_ctl start all -l http://127.0.0.1:2379"
    #
    #   On Linux with systemd:
    #     docker exec sqlkit-gbase8c systemctl start etcd.service
    #     docker exec sqlkit-gbase8c su - gbase -c "gha_ctl start all -l http://127.0.0.1:2379"
    #
    #   Status check:
    #     ./scripts/init-gbase8c.sh --status

  # ── GoldenDB (中兴 信创 MySQL-compatible distributed) ──────────
  # No public single-container Docker image available.
  # GoldenDB is based on MySQL 8.0 kernel, MySQL-wire compatible.
  # Requires multi-node deployment with CN/DN/GTM/LDS containers.
  # For protocol compatibility testing, MySQL 8.0 in sqlkit-core
  # covers the MySQL-wire protocol (GoldenDB's wire is identical).
  # Cloud/ production testing requires dedicated environment.

volumes:
  dm8_data:

networks:
  sqlkit-xc-net:
    driver: bridge
