      - node.roles=master
      - cluster.initial_master_nodes=master-1,master-2,master-3
      - discovery.seed_hosts=master-1,master-3
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/master-2/master-2.key
      - xpack.security.http.ssl.certificate=certs/master-2/master-2.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.http.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/master-2/master-2.key
      - xpack.security.transport.ssl.certificate=certs/master-2/master-2.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    mem_limit: 512m
    ulimits:
      memlock:
