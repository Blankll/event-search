      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 768m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana-prod:
    depends_on:
      coord-1:
        condition: service_healthy
      coord-2:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:9.3.3
    container_name: kibana-prod
    volumes:
      - certs-prod:/usr/share/kibana/config/certs
      - kibanadata-prod:/usr/share/kibana/data
    ports:
      - ${KIBANA_PORT_PROD}:5601
    environment:
      - SERVERNAME=kibana-prod
      - ELASTICSEARCH_HOSTS=https://coord-1:9200,https://coord-2:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - "NODE_OPTIONS=--max-old-space-size=512"
    mem_limit: 768m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

volumes:
  certs-prod:
    driver: local
  masterdata1:
    driver: local
  masterdata2:
    driver: local
  masterdata3:
    driver: local
  datadata1:
    driver: local
  datadata2:
    driver: local
  datadata3:
    driver: local
  datadata4:
    driver: local
  datadata5:
    driver: local
  coorddata1:
    driver: local
  coorddata2:
    driver: local
  ingestdata1:
    driver: local
  kibanadata-prod:
    driver: local