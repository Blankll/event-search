  security-admin-init:
    image: opensearchproject/opensearch:3.6.0
    container_name: os-security-admin-init
    depends_on:
      cm-1:
        condition: service_healthy
      cm-2:
        condition: service_healthy
      cm-3:
        condition: service_healthy
    volumes:
      - os-certs:/usr/share/opensearch/config/certs
      - ./opensearch-security-config:/usr/share/opensearch/config/opensearch-security
    command: >
      bash -c '
        echo "Waiting for cluster to be ready...";
        until curl -s -k https://cm-1:9200/_cluster/health | grep -q "green"; do sleep 5; done;
        echo "Initializing security configuration...";
        ./plugins/opensearch-security/tools/securityadmin.sh -cd /usr/share/opensearch/config/opensearch-security -icl -nhnv -cacert /usr/share/opensearch/config/certs/ca.pem -cert /usr/share/opensearch/config/certs/admin.pem -key /usr/share/opensearch/config/certs/admin.key -h cm-1;
        echo "Security configuration initialized successfully";
      '

