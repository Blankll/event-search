name: opensearch-cluster-production

services:
  minio:
    image: minio/minio:latest
    container_name: os-minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: opensearch
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: os-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 opensearch ${MINIO_ROOT_PASSWORD};
      mc mb myminio/opensearch-segments;
      mc mb myminio/opensearch-translog;
      mc mb myminio/opensearch-state;
      echo 'MinIO buckets created successfully';
      "

  security-setup:
    image: opensearchproject/opensearch:3.6.0
    container_name: os-security-setup
    user: "0"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - os-certs:/usr/share/opensearch/config/certs
      - ./opensearch-security-config:/usr/share/opensearch/config/opensearch-security
    environment:
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - OPENSEARCH_KIBANA_PASSWORD=${OPENSEARCH_KIBANA_PASSWORD}
    command: >
      bash -c '
        if [ x${OPENSEARCH_ADMIN_PASSWORD} == x ]; then
          echo "Set the OPENSEARCH_ADMIN_PASSWORD environment variable in the .env file";
          exit 1;
        elif [ x${OPENSEARCH_KIBANA_PASSWORD} == x ]; then
          echo "Set the OPENSEARCH_KIBANA_PASSWORD environment variable in the .env file";
          exit 1;
        fi;

        echo "Generating certificates...";
        mkdir -p /usr/share/opensearch/config/certs;

        openssl genrsa -out /usr/share/opensearch/config/certs/ca.key 4096;
        openssl req -new -x509 -key /usr/share/opensearch/config/certs/ca.key -out /usr/share/opensearch/config/certs/ca.pem -days 3650 -subj "/CN=OS-CA";

        for node in cm-1 cm-2 cm-3 data-1 data-2 data-3 search-1 search-2 coord-1 coord-2; do
          openssl genrsa -out /usr/share/opensearch/config/certs/${node}.key 2048;
          openssl req -new -key /usr/share/opensearch/config/certs/${node}.key -out /usr/share/opensearch/config/certs/${node}.csr -subj "/CN=${node}";
          openssl x509 -req -in /usr/share/opensearch/config/certs/${node}.csr -CA /usr/share/opensearch/config/certs/ca.pem -CAkey /usr/share/opensearch/config/certs/ca.key -CAcreateserial -out /usr/share/opensearch/config/certs/${node}.pem -days 3650;
          cat /usr/share/opensearch/config/certs/${node}.key /usr/share/opensearch/config/certs/${node}.pem > /usr/share/opensearch/config/certs/${node}-all.pem;
        done;

        openssl genrsa -out /usr/share/opensearch/config/certs/admin.key 2048;
        openssl req -new -key /usr/share/opensearch/config/certs/admin.key -out /usr/share/opensearch/config/certs/admin.csr -subj "/CN=admin";
        openssl x509 -req -in /usr/share/opensearch/config/certs/admin.csr -CA /usr/share/opensearch/config/certs/ca.pem -CAkey /usr/share/opensearch/config/certs/ca.key -CAcreateserial -out /usr/share/opensearch/config/certs/admin.pem -days 3650;
        cat /usr/share/opensearch/config/certs/admin.key /usr/share/opensearch/config/certs/admin.pem > /usr/share/opensearch/config/certs/admin-all.pem;

        ADMIN_HASH=$(./plugins/opensearch-security/tools/hash.sh -p ${OPENSEARCH_ADMIN_PASSWORD} | tail -n 1);
        KIBANA_HASH=$(./plugins/opensearch-security/tools/hash.sh -p ${OPENSEARCH_KIBANA_PASSWORD} | tail -n 1);

        echo "---" > /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "_meta:" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  type: internalusers" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  config_version: 2" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "admin:" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  hash: ${ADMIN_HASH}" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  reserved: true" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  backend_roles:" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "    - admin" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  description: Admin user for OpenSearch cluster" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "kibanaserver:" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  hash: ${KIBANA_HASH}" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  reserved: true" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;
        echo "  description: OpenSearch Dashboards server user" >> /usr/share/opensearch/config/opensearch-security/internal_users.yml;

        chmod 600 /usr/share/opensearch/config/certs/*.key;
        chmod 644 /usr/share/opensearch/config/certs/*.pem;

        echo "Certificates and security config generated successfully";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/opensearch/config/certs/cm-1.pem ]"]
      interval: 1s
      timeout: 5s
      retries: 120

  cm-1:
    image: opensearchproject/opensearch:3.6.0
    container_name: os-cm-1
    depends_on:
      security-setup:
        condition: service_healthy
    volumes:
      - os-certs:/usr/share/opensearch/config/certs
      - cm-data-1:/usr/share/opensearch/data
    environment:
      - node.name=cm-1
      - cluster.name=${OPENSEARCH_CLUSTER_NAME_PROD}
      - node.roles=cluster_manager
      - cluster.initial_cluster_manager_nodes=cm-1,cm-2,cm-3
      - discovery.seed_hosts=cm-2,cm-3
      - network.host=0.0.0.0
      - bootstrap.memory_lock=true
      - plugins.security.disabled=false
      - plugins.security.ssl.transport.pemcert_filepath=certs/cm-1-all.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/cm-1.key
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.pemcert_filepath=certs/cm-1-all.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/cm-1.key
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/ca.pem
      - plugins.security.allow_unsafe_democertificates=false
      - plugins.security.allow_default_init_securityindex=false
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=cm-1","CN=cm-2","CN=cm-3","CN=data-1","CN=data-2","CN=data-3","CN=search-1","CN=search-2","CN=coord-1","CN=coord-2"]
      - "OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m"
    mem_limit: 512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k https://localhost:9200 | grep -q 'OpenSearch'"]
      interval: 10s
      timeout: 10s
      retries: 120

  cm-2:
    image: opensearchproject/opensearch:3.6.0
